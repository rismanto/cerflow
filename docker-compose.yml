version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: cerflow-db
    restart: always
    environment:
      MYSQL_DATABASE: cer_flow_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: cerflow_user
      MYSQL_PASSWORD: cerflow_password
    ports:
      - "3306:3306"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
